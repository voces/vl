plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

configurations {
    antlr
}

dependencies {
    antlr 'org.antlr:antlr4:4.13.1'
}

task generateAntlrTypescript(type: JavaExec) {
    // Define the directory containing .g4 files
    def antlrSrcDir = "${projectDir}"

    // Ensure the output directory exists
    def outputDir = "${projectDir}/../compiler/antlr"
    mkdir outputDir

    inputs.files(fileTree(antlrSrcDir) {
        include '**/*.g4'
    })

    doFirst {
        // Delete existing generated files
        delete fileTree(outputDir) {
            include '**/*.tokens', '**/*.interp', '**/*.js', '**/*.ts'
        }
    }

    main = 'org.antlr.v4.Tool'
    classpath = configurations.antlr
    args = ['-Dlanguage=TypeScript', // TypeScript target
            '-o', outputDir, // Output directory
            '-visitor', // Generate visitor
            '-listener', // Generate listener
            '-lib', antlrSrcDir, // Where to find token files
            '-package', 'antlrTypescript', // Specify package
            "${antlrSrcDir}/VL_Lexer.g4",
            "${antlrSrcDir}/VL_Parser.g4"]

    doLast {
        // The ANTLR TypeScript target emits members that trip `deno check` under
        // strict mode (e.g. TS4114 missing-`override`). This is generated code we
        // don't author, so skip type-checking it — `// @ts-nocheck` is prepended
        // to every generated `.ts` so `deno check` of the rest of the tree stays
        // clean. Re-applied on every regen.
        fileTree(outputDir) { include '**/*.ts' }.each { f ->
            def text = f.text
            if (!text.startsWith('// @ts-nocheck')) {
                f.text = '// @ts-nocheck\n' + text
            }
        }
    }
}

compileJava.dependsOn generateAntlrTypescript
