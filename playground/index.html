<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VL Playground</title>
    <style>
      :root {
        color-scheme: dark; /* dark native scrollbars + form controls */
        --bg: #1e1e1e;
        --panel: #252526;
        --border: #3c3c3c;
        --fg: #d4d4d4;
        --muted: #888;
        --accent: #0e639c;
        --accent-hover: #1177bb;
        --error: #f48771;
        --warning: #cca700;
        --info: #75beff;
        --ok: #89d185;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        flex-wrap: wrap;
      }
      header h1 {
        font-size: 16px;
        margin: 0;
        font-weight: 600;
      }
      header .spacer {
        flex: 1;
      }
      button, select {
        font: inherit;
        background: var(--panel);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 10px;
      }
      button#run {
        background: var(--accent);
        border-color: var(--accent);
        cursor: pointer;
      }
      button#run:hover:not(:disabled) {
        background: var(--accent-hover);
      }
      button#run:disabled {
        opacity: 0.5;
        cursor: default;
      }
      label.toggle {
        font-size: 13px;
        color: var(--muted);
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }
      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      .col {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .col.left {
        flex: 1;
        border-right: 1px solid var(--border);
      }
      .col.right {
        flex: 1;
      }
      #editor {
        flex: 1;
        min-height: 0;
        background: var(--bg);
      }
      .pane-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        padding: 6px 12px;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      .col.right {
        overflow: auto;
      }
      #diagnostics, #log, #wat {
        margin: 0;
        padding: 10px 12px;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12.5px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .diag {
        padding: 2px 0;
      }
      .diag.error {
        color: var(--error);
      }
      .diag.warning {
        color: var(--warning);
      }
      .diag.info {
        color: var(--info);
      }
      .diag.ok {
        color: var(--ok);
      }
      #status {
        font-size: 12px;
        color: var(--muted);
        padding: 4px 12px;
        border-top: 1px solid var(--border);
        background: var(--panel);
      }
      #status[data-kind="error"] {
        color: var(--error);
      }
      #status[data-kind="busy"] {
        color: var(--info);
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>VL Playground</h1>
      <!-- Options are static so the picker is populated on first paint (before
           the compiler bundle loads); keep in sync with src/samples.ts order. -->
      <select id="samples" title="Load a sample program">
        <option value="0">print — values of every printable type</option>
        <option value="1">loops — while + for…in over an array</option>
        <option value="2">for — step controls increment and direction</option>
        <option value="3">error — a type mismatch (shows diagnostics)</option>
      </select>
      <label class="toggle"><input type="checkbox" id="wat-toggle" /> Show
        WAT</label>
      <span class="spacer"></span>
      <button id="run" type="button">Run</button>
    </header>
    <main>
      <div class="col left">
        <div id="editor"></div>
      </div>
      <div class="col right">
        <div class="pane-title">Diagnostics</div>
        <div id="diagnostics"></div>
        <div class="pane-title">Output (log)</div>
        <pre id="log"></pre>
        <div id="wat-section" hidden>
          <div class="pane-title">WAT</div>
          <pre id="wat"></pre>
        </div>
      </div>
    </main>
    <div id="status">Loading…</div>
    <!-- Monaco's styles are bundled by esbuild into a sibling CSS file. -->
    <link rel="stylesheet" href="./dist/playground.css" />
    <script type="module" src="./dist/playground.js"></script>
  </body>
</html>
