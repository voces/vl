<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vital Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ui: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
        --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        --brand: "Space Grotesk", var(--ui);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { font-family: var(--ui); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

      /* ---------- light (default) ---------- */
      .app {
        --accent: #10915f; --accent-hover: #0c7d51; --on-accent: #ffffff;
        --app: #f4f6f3; --bar: #ffffff; --panel: #ffffff; --editor: #ffffff;
        --border: #e7ece5; --border-strong: #dde4db;
        --fg: #16201b; --muted: #74837a; --faint: #9aa79f;
        --input: #eef2ec; --input-hover: #e6ebe3;
        --accent-soft: #e6f2ec; --accent-soft-fg: #0c7d51;
        --err: #d9483b; --err-soft: #fbecea;
        --shadow: 0 1px 2px rgba(22,32,27,0.05), 0 12px 32px -16px rgba(22,32,27,0.18);
        --run-shadow: 0 1px 2px rgba(16,145,95,0.35), 0 6px 18px -8px rgba(16,145,95,0.5);
      }
      /* ---------- dark ---------- */
      .app[data-mode="dark"] {
        --accent: #2fb87f; --accent-hover: #38c98c; --on-accent: #06140d;
        --app: #0a100d; --bar: #0f1714; --panel: #0d1411; --editor: #0e1512;
        --border: #1d2823; --border-strong: #243029;
        --fg: #d6ddd6; --muted: #7f9088; --faint: #5d6b62;
        --input: #15201b; --input-hover: #1c2922;
        --accent-soft: #12281e; --accent-soft-fg: #5ad49a;
        --err: #ff6b5e; --err-soft: #2a1714;
        --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 16px 40px -20px rgba(0,0,0,0.7);
        --run-shadow: 0 1px 16px rgba(47,184,127,0.35);
      }
      .app[data-mode="dark"] { color-scheme: dark; }

      .app {
        height: 100%; display: flex; flex-direction: column;
        background: var(--app); color: var(--fg);
      }

      /* ---------------- top bar ---------------- */
      .top {
        display: flex; align-items: center; gap: 14px;
        height: 56px; flex: 0 0 56px; padding: 0 16px;
        background: var(--bar); border-bottom: 1px solid var(--border);
      }
      .brand { display: flex; align-items: center; gap: 11px; padding-right: 4px; flex: 0 0 auto; }
      .mark {
        width: 30px; height: 30px; border-radius: 9px; flex: 0 0 30px;
        display: grid; place-items: center; color: var(--on-accent);
        background: var(--accent); box-shadow: var(--run-shadow);
      }
      .mark svg { display: block; }
      .word { font-family: var(--brand); font-weight: 700; font-size: 17px; letter-spacing: -0.02em; white-space: nowrap; }
      .word .pg {
        font-family: var(--ui); font-weight: 500; font-size: 11px; letter-spacing: 0.04em;
        text-transform: uppercase; color: var(--muted); margin-left: 8px;
        border: 1px solid var(--border-strong); border-radius: 999px; padding: 2px 8px;
        vertical-align: 2px;
      }

      .divider { width: 1px; height: 26px; background: var(--border-strong); margin: 0 2px; flex: 0 0 auto; }

      /* sample picker — the ONLY flexible item; truncates with ellipsis */
      .picker { position: relative; min-width: 0; flex: 0 1 auto; }
      .picker-btn {
        display: inline-flex; align-items: center; gap: 9px; height: 36px;
        padding: 0 12px; border-radius: 10px; cursor: pointer;
        background: var(--input); border: 1px solid var(--border);
        color: var(--fg); font-family: var(--ui); font-size: 13px; font-weight: 500;
        min-width: 0; max-width: 340px; width: 100%;
      }
      .picker-btn:hover { background: var(--input-hover); }
      .picker-btn .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .picker-btn svg { color: var(--muted); flex: 0 0 auto; }
      .picker-btn .ic { color: var(--accent); flex: 0 0 auto; display: inline-flex; }
      .menu {
        position: absolute; top: 44px; left: 0; z-index: 30; width: 360px;
        background: var(--panel); border: 1px solid var(--border-strong);
        border-radius: 12px; box-shadow: var(--shadow); padding: 6px;
        display: none;
      }
      .menu.open { display: block; }
      .menu-item {
        display: flex; align-items: flex-start; gap: 10px; padding: 9px 10px;
        border-radius: 8px; cursor: pointer;
      }
      .menu-item:hover { background: var(--input); }
      .menu-item.sel { background: var(--accent-soft); }
      .menu-item .mi-ic { color: var(--accent); margin-top: 1px; flex: 0 0 auto; display: inline-flex; }
      .menu-item .mi-tx { display: flex; flex-direction: column; gap: 2px; }
      .menu-item .mi-nm { font-size: 13px; font-weight: 500; color: var(--fg); }
      .menu-item .mi-sub { font-size: 11.5px; color: var(--muted); font-family: var(--mono); }

      .spacer { flex: 1 1 auto; min-width: 8px; }

      .btn {
        display: inline-flex; align-items: center; gap: 7px; height: 36px; flex: 0 0 auto;
        padding: 0 13px; border-radius: 10px; cursor: pointer; white-space: nowrap;
        font-family: var(--ui); font-size: 13px; font-weight: 500;
        border: 1px solid var(--border); background: var(--input); color: var(--fg);
      }
      .btn:hover { background: var(--input-hover); }
      .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
      .btn.ghost:hover { background: var(--input); color: var(--fg); }
      .btn svg { color: var(--muted); }
      .btn.ghost:hover svg, .btn:hover svg { color: var(--fg); }
      .icon-btn {
        width: 36px; height: 36px; border-radius: 10px; cursor: pointer; flex: 0 0 36px;
        display: grid; place-items: center; border: 1px solid transparent;
        background: transparent; color: var(--muted);
      }
      .icon-btn:hover { background: var(--input); color: var(--fg); }

      .run {
        display: inline-flex; align-items: center; gap: 8px; height: 36px; flex: 0 0 auto;
        padding: 0 16px; border-radius: 10px; cursor: pointer; white-space: nowrap;
        font-family: var(--ui); font-size: 13px; font-weight: 600;
        border: 1px solid transparent; background: var(--accent); color: var(--on-accent);
        box-shadow: var(--run-shadow);
      }
      .run:hover { background: var(--accent-hover); }
      .run:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }
      .run .rk { font-family: var(--mono); font-size: 11px; opacity: 0.85; }
      .run svg { margin-left: -2px; }

      /* auto-run toggle */
      .autorun {
        display: inline-flex; align-items: center; gap: 8px; height: 36px; flex: 0 0 auto;
        padding: 0 12px 0 10px; border-radius: 10px; cursor: pointer; white-space: nowrap;
        font-family: var(--ui); font-size: 13px; font-weight: 500;
        border: 1px solid var(--border); background: var(--input); color: var(--muted);
      }
      .autorun:hover { background: var(--input-hover); color: var(--fg); }
      .autorun .sw {
        width: 26px; height: 16px; border-radius: 999px; background: var(--border-strong);
        position: relative; transition: background 0.18s; flex: 0 0 auto;
      }
      .autorun .knob {
        position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 999px;
        background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.3); transition: transform 0.18s;
      }
      .autorun[aria-checked="true"] { color: var(--fg); border-color: var(--accent); background: var(--accent-soft); }
      .autorun[aria-checked="true"] .sw { background: var(--accent); }
      .autorun[aria-checked="true"] .knob { transform: translateX(10px); }

      /* ---------------- body ---------------- */
      .body { flex: 1 1 auto; display: flex; min-height: 0; }
      .editor-pane {
        flex: 1.4 1 0; min-width: 0; display: flex; flex-direction: column;
        background: var(--editor); border-right: 1px solid var(--border);
      }
      .pane-head {
        display: flex; align-items: center; height: 40px; flex: 0 0 40px;
        padding: 0 12px 0 8px; border-bottom: 1px solid var(--border); gap: 6px;
      }
      .ftabs { display: flex; align-items: center; gap: 1px; overflow-x: auto; min-width: 0; height: 100%; }
      .ftabs::-webkit-scrollbar { display: none; }
      .ftab {
        display: inline-flex; align-items: center; gap: 7px; height: 40px; padding: 0 9px;
        background: transparent; border: none; cursor: pointer; color: var(--muted);
        font-family: var(--mono); font-size: 12.5px; font-weight: 500;
        border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; flex: 0 0 auto;
      }
      .ftab:hover { color: var(--fg); }
      .ftab.active { color: var(--fg); border-bottom-color: var(--accent); }
      .ftab .fdot { width: 6px; height: 6px; border-radius: 999px; background: var(--faint); flex: 0 0 auto; }
      .ftab .fdot.entry { background: var(--accent); }
      .ftab .fname { pointer-events: none; }
      .ftab .fclose {
        display: inline-flex; align-items: center; justify-content: center;
        width: 16px; height: 16px; border-radius: 5px; color: var(--faint);
        opacity: 0; margin: 0 -4px 0 1px;
      }
      .ftab:hover .fclose, .ftab.active .fclose { opacity: 0.75; }
      .ftab .fclose:hover { background: var(--input-hover); color: var(--fg); opacity: 1; }
      .fadd {
        width: 26px; height: 26px; border-radius: 7px; flex: 0 0 auto; display: grid; place-items: center;
        border: 1px solid transparent; background: transparent; color: var(--muted); cursor: pointer;
      }
      .fadd:hover { background: var(--input); color: var(--fg); }
      .pane-meta { margin-left: auto; font-family: var(--mono); font-size: 11.5px; color: var(--faint); white-space: nowrap; padding-left: 8px; }
      #editor { flex: 1 1 auto; min-height: 0; }

      .results-pane { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; background: var(--panel); }
      .tabs { display: flex; align-items: center; height: 40px; flex: 0 0 40px; padding: 0 8px; border-bottom: 1px solid var(--border); gap: 2px; }
      .tab {
        display: inline-flex; align-items: center; gap: 7px; height: 40px; padding: 0 12px;
        font-size: 12.5px; font-weight: 500; cursor: pointer; color: var(--muted);
        border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap;
      }
      .tab:hover { color: var(--fg); }
      .tab.active { color: var(--fg); border-bottom-color: var(--accent); }
      .tab .count {
        font-family: var(--mono); font-size: 10.5px; line-height: 1; padding: 2px 6px;
        border-radius: 999px; background: var(--input); color: var(--muted);
      }
      .tab .count.info { background: var(--accent-soft); color: var(--accent-soft-fg); }
      .tab .count.err { background: var(--err-soft); color: var(--err); }
      .tabs .meta { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); padding-right: 8px; white-space: nowrap; }

      .panes { flex: 1 1 auto; min-height: 0; position: relative; }
      .pane { position: absolute; inset: 0; overflow: auto; padding: 14px 16px; display: none; }
      .pane.active { display: block; }
      .pane::-webkit-scrollbar { width: 10px; height: 10px; }
      .pane::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; border: 3px solid var(--panel); }

      /* output */
      .out-line {
        font-family: var(--mono); font-size: 12.5px; line-height: 20px; color: var(--fg);
        white-space: pre-wrap; padding: 1px 0;
      }
      .out-empty { color: var(--faint); font-size: 13px; font-family: var(--ui); display: flex; flex-direction: column; gap: 6px; height: 100%; align-items: center; justify-content: center; text-align: center; }
      .out-empty .big { font-size: 13px; color: var(--muted); }
      .out-empty kbd { font-family: var(--mono); font-size: 11px; border: 1px solid var(--border-strong); border-radius: 6px; padding: 2px 6px; color: var(--muted); }
      .out-foot { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--muted); font-family: var(--ui); }
      .out-foot .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--accent); flex: 0 0 auto; }

      /* wat */
      pre.wat { margin: 0; font-family: var(--mono); font-size: 12px; line-height: 19px; color: var(--fg); white-space: pre; }

      /* diagnostics */
      .diag { display: flex; gap: 11px; align-items: baseline; padding: 9px 8px; border-radius: 8px; }
      .diag + .diag { margin-top: 2px; }
      .diag:hover { background: var(--input); }
      .diag .sev { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 7px; border-radius: 6px; flex: 0 0 auto; }
      .diag .sev.info { background: var(--accent-soft); color: var(--accent-soft-fg); }
      .diag .sev.warning { background: var(--accent-soft); color: var(--accent-soft-fg); }
      .diag .sev.hint { background: var(--input); color: var(--muted); }
      .diag .sev.error { background: var(--err-soft); color: var(--err); }
      .diag .loc { font-family: var(--mono); font-size: 11.5px; color: var(--faint); flex: 0 0 auto; cursor: pointer; }
      .diag .loc:hover { color: var(--accent); text-decoration: underline; }
      .diag .msg { font-size: 12.5px; line-height: 18px; color: var(--fg); }
      .diag .msg code { font-family: var(--mono); font-size: 11.5px; background: var(--input); padding: 1px 5px; border-radius: 5px; }
      .diag-empty { color: var(--faint); font-size: 13px; display: flex; align-items: center; gap: 8px; height: 100%; justify-content: center; }

      /* status — full-width footer spanning editor + results */
      .status {
        height: 28px; flex: 0 0 28px; display: flex; align-items: center; gap: 10px;
        padding: 0 14px; font-size: 11.5px; color: var(--muted);
        border-top: 1px solid var(--border); background: var(--bar);
        font-family: var(--ui);
      }
      .status .live { width: 7px; height: 7px; border-radius: 999px; background: var(--accent); transition: background 0.2s; flex: 0 0 auto; }
      .status .live.busy { background: var(--faint); animation: pulse 0.8s ease-in-out infinite; }
      .status .live.err { background: var(--err); }
      @keyframes pulse { 50% { opacity: 0.35; } }
      .status .st-text { color: var(--fg); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .status .st-item { font-family: var(--mono); color: var(--muted); white-space: nowrap; }
      .status .st-cursor { min-width: 116px; }
      .status .st-sep { width: 1px; height: 13px; background: var(--border-strong); flex: 0 0 auto; }
      .status .st-gap { margin-left: auto; }
      .status .st-badge {
        font-family: var(--mono); font-size: 10.5px; font-weight: 500; letter-spacing: 0.02em;
        color: var(--accent-soft-fg); background: var(--accent-soft);
        padding: 2px 7px; border-radius: 5px; flex: 0 0 auto;
      }

      /* loading veil for monaco */
      .editor-wrap { position: relative; flex: 1 1 auto; min-height: 0; display: flex; }
      .editor-wrap #editor { flex: 1 1 auto; }
      .veil { position: absolute; inset: 0; display: grid; place-items: center; background: var(--editor); color: var(--faint); font-size: 13px; z-index: 2; }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <header class="top">
        <div class="brand">
          <div class="mark">
            <svg width="17" height="17" viewBox="0 0 16 16" fill="none"><path d="M2.5 3.5l5.5 9 5.5-9" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="word">Vital<span class="pg">Playground</span></div>
        </div>
        <div class="divider"></div>
        <div class="picker">
          <button class="picker-btn" id="pickerBtn" aria-haspopup="true">
            <span class="ic" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="3" stroke="currentColor" stroke-width="1.4"/><path d="M5.5 8l1.8 1.8L10.8 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <span class="nm" id="pickerName">Loading…</span>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="menu" id="menu"></div>
        </div>
        <div class="spacer"></div>
        <button class="btn ghost" id="format" title="Format" type="button">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 4h10M3 8h6M3 12h8"/></svg>
          <span class="format-label">Format</span>
        </button>
        <button class="btn" id="share" title="Copy a shareable link to the clipboard" type="button">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 8.5l5-3M5.5 7.5l5 3"/><circle cx="3.4" cy="8" r="1.7"/><circle cx="12.6" cy="4" r="1.7"/><circle cx="12.6" cy="12" r="1.7"/></svg>
          <span class="share-label">Share</span>
        </button>
        <button class="autorun" id="autorun" role="switch" aria-checked="false" title="Re-run automatically as you type" type="button">
          <span class="sw"><span class="knob"></span></span>
          Auto-run
        </button>
        <button class="run" id="run" type="button">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M4 3.1v9.8a.6.6 0 0 0 .92.5l7.7-4.9a.6.6 0 0 0 0-1L4.92 2.6A.6.6 0 0 0 4 3.1z"/></svg>
          <span class="run-label">Run</span> <span class="rk">⌘↵</span>
        </button>
        <div class="divider"></div>
        <button class="icon-btn" id="theme" title="Toggle theme" aria-label="Toggle theme" type="button"></button>
      </header>

      <div class="body">
        <section class="editor-pane">
          <div class="pane-head">
            <div class="ftabs" id="ftabs"></div>
            <button class="fadd" id="fadd" title="New file" aria-label="New file" type="button">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3.5v9M3.5 8h9"/></svg>
            </button>
            <span class="pane-meta" id="editorMeta">VL</span>
          </div>
          <div class="editor-wrap">
            <div id="editor"></div>
            <div class="veil" id="veil">Loading editor…</div>
          </div>
        </section>

        <section class="results-pane">
          <div class="tabs" id="tabs">
            <span class="tab active" data-pane="out">Output</span>
            <span class="tab" data-pane="wat">WAT <span class="count" id="watCount">—</span></span>
            <span class="tab" data-pane="diag">Diagnostics <span class="count" id="diagCount">0</span></span>
            <span class="meta" id="tabMeta"></span>
          </div>
          <div class="panes">
            <div class="pane active" data-pane="out" id="log"></div>
            <div class="pane" data-pane="wat" id="wat"></div>
            <div class="pane" data-pane="diag" id="diagnostics"></div>
          </div>
        </section>
      </div>

      <footer class="status">
        <span class="live" id="live"></span>
        <span class="st-text" id="status">Loading…</span>
        <span class="st-sep"></span>
        <span class="st-item" id="statusFile">main.vl</span>
        <span class="st-gap"></span>
        <span class="st-item st-cursor" id="statusCursor">Ln 1, Col 1</span>
        <span class="st-sep"></span>
        <span class="st-item" id="statusSize">—</span>
        <span class="st-sep"></span>
        <span class="st-badge">VL</span>
      </footer>
    </div>

    <!-- Monaco's styles are bundled by esbuild into a sibling CSS file. -->
    <link rel="stylesheet" href="./dist/playground.css" />
    <script type="module" src="./dist/playground.js"></script>
  </body>
</html>
