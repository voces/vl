name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Fetch enough history for `git diff` to compare against the base.
          # On push events base_sha is available; on PRs we need the base ref.
          fetch-depth: 0

      # ---------------------------------------------------------------------------
      # Docs-only gate
      #
      # Detect whether every changed file matches *.md or docs/**. If so, the
      # heavy steps below are skipped and the job still exits green — which keeps
      # any required "ci" status check satisfied without blocking merges.
      #
      # We intentionally do NOT use top-level `paths`/`paths-ignore` to skip the
      # whole workflow: that would leave the required check in a permanent "pending"
      # state for docs-only PRs and block merges. The in-job conditional approach
      # keeps the job name stable so branch protection is never broken.
      #
      # On `pull_request` events we diff the PR head against its base branch.
      # On `push` events we diff against the previous commit (BEFORE~1..AFTER).
      # ---------------------------------------------------------------------------
      - name: Detect docs-only change
        id: docs_check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi

          # Fall back to HEAD~1 if before-sha is the all-zeros sha (first push
          # to a new branch) or empty.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi

          # List files changed between base and head. Filter to only non-docs files.
          NON_DOCS=$(git diff --name-only "$BASE" "$HEAD" \
            | grep -Ev '^(docs/|.*\.md$)' || true)

          if [ -z "$NON_DOCS" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Docs-only change detected — heavy steps will be skipped."
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Non-docs files changed:"
            echo "$NON_DOCS"
          fi

      - uses: denoland/setup-deno@v2
        if: steps.docs_check.outputs.docs_only != 'true'
        with:
          deno-version: v2.x

      # The LSP bundle is built with esbuild over node-resolved deps (binaryen,
      # vscode-languageserver*), so Node + node_modules are needed for that step.
      - uses: actions/setup-node@v5
        if: steps.docs_check.outputs.docs_only != 'true'
        with:
          node-version: 22
          cache: npm

      # Deno's module cache (esbuild, the jsr loader, std) — keyed on the lockfile
      # so it's reused until a dependency moves.
      - name: Cache Deno modules
        if: steps.docs_check.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Install node deps
        if: steps.docs_check.outputs.docs_only != 'true'
        run: npm ci

      # `deno check` now covers only the surviving type leaves (coreTypes.ts,
      # diagnostics.ts) — the TS compiler core is deleted; the `.vl` compiler is
      # type-checked by the native checker (lint-self.sh in ci-native).
      - name: Type-check (compiler)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno check compiler/*.ts

      - name: Lint
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno lint

      - name: Test (.vl corpus)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno task test

      - name: Build LSP bundle (verify it compiles)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno task build
        working-directory: lsp

  # ---------------------------------------------------------------------------
  # ci-native — gates the NATIVE self-hosting path (scripts/vl-host + the
  # self-host compiler wasm), end to end with zero TS/deno in the compile+run
  # loop past the seed. A SEPARATE, PARALLEL job: it never extends the `ci` job's
  # critical path (the maintainer is duration-sensitive), and a slow cold cargo
  # build here can't delay the deno suite's result.
  #
  # Steps: build the vl-host binary → build the seed compiler wasm → prove the
  # native fixpoint (stage3 == stage4 byte-for-byte) → run the native corpus
  # alignment + `build -O` suites (env-gated, drive the corpus through `vl`).
  #
  # Caching: ubuntu-latest ships cargo, so we only cache ~/.cargo + the cargo
  # target dir (cold wasmtime build ~2-4 min, warm seconds — busted only when
  # scripts/vl-host/Cargo.lock changes).
  #
  # Docs-only skip is mirrored from `ci` so a docs-only PR exits this job green
  # too (keeping the stable job name satisfied for branch protection).
  # ---------------------------------------------------------------------------
  ci-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect docs-only change
        id: docs_check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi

          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi

          NON_DOCS=$(git diff --name-only "$BASE" "$HEAD" \
            | grep -Ev '^(docs/|.*\.md$)' || true)

          if [ -z "$NON_DOCS" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Docs-only change detected — heavy steps will be skipped."
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Non-docs files changed:"
            echo "$NON_DOCS"
          fi

      # deno serves only the test tooling in this job (the corpus oracle + native
      # suites). The seed is obtained natively — cache, else the release seed via
      # scripts/fetch-seed.sh — so no Node/npm is needed here (the TS stage-0
      # toolchain that required binaryen from npm is off this path).
      - uses: denoland/setup-deno@v2
        if: steps.docs_check.outputs.docs_only != 'true'
        with:
          deno-version: v2.x

      - name: Cache Deno modules
        if: steps.docs_check.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-

      # Cargo registry/index + the vl-host target dir. Cold wasmtime build is the
      # only real cost here; warm restores drop it to seconds.
      #
      # The rustc version is part of the key ON PURPOSE: a target dir compiled by
      # one rustc is fully fingerprint-invalidated under the next (ubuntu-latest
      # bumps rustc often), AND actions/cache skips saving when the primary key
      # already exists — so without the version in the key, one toolchain bump
      # locks every later run into "restore stale → recompile all of wasmtime
      # cold → never resave". Versioned keys make a bump a clean miss: rebuild
      # once, save, warm thereafter. The broader restore-keys still carry the
      # registry/index across versions (downloads are version-agnostic).
      - name: Rustc version (cargo cache key)
        if: steps.docs_check.outputs.docs_only != 'true'
        id: rustc
        run: echo "v=$(rustc -V | tr ' ' '_')" >> "$GITHUB_OUTPUT"

      - name: Cache cargo + vl-host target
        if: steps.docs_check.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            scripts/vl-host/target
          key: cargo-${{ runner.os }}-${{ steps.rustc.outputs.v }}-${{ hashFiles('scripts/vl-host/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ steps.rustc.outputs.v }}-
            cargo-${{ runner.os }}-

      - name: Build vl-host (native tool)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: cargo build --release
        working-directory: scripts/vl-host

      # The rolling seed cache (F-tiers): an exact hit means the seed was built
      # from THIS compiler source; a restore-keys hit hands refresh-compiler.sh a
      # healthy older seed to SELF-compile current source with (~3s). On a cold
      # cache refresh-compiler.sh fetches the release seed (scripts/fetch-seed.sh,
      # below) rather than TS-minting. The downstream fixpoint step (stage3 ==
      # stage4) re-proves the refreshed seed every run, so neither a cache hit nor
      # a fetched seed weakens the gate.
      - name: Cache seed compiler wasm
        if: steps.docs_check.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: build/vl-compiler.wasm
          key: vl-seed-${{ runner.os }}-${{ hashFiles('compiler/*.vl') }}
          restore-keys: |
            vl-seed-${{ runner.os }}-

      # Self-compile current source with the seed. On a cold cache
      # refresh-compiler.sh fetches the release `seed-latest` (one push stale is
      # fine — the fixpoint re-proves it); a seed too stale to compile current
      # source fails loud (re-fetch seed-latest / land the change in smaller steps).
      # GH_TOKEN lets fetch-seed.sh use `gh release download` on the cold path.
      - name: Refresh seed compiler wasm (self-compile; release-seed fetch fallback)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: ./scripts/refresh-compiler.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Native fixpoint (stage3 == stage4)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: ./scripts/native-fixpoint.sh

      # Dogfood: `vl` lints its own source (`compiler/*.vl` + driver + `std/`),
      # gated at `info` (prefer-const / unused / warnings / errors all fail).
      - name: Self-lint (vl check on the compiler's own source)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: ./scripts/lint-self.sh

      # The native-binary suites (env-gated, drive `vl` against the seed) are
      # discovered by convention — `selfhost_native_*` (corpus alignment / -O /
      # conversion / diag positions) and `vl_*` (the `vl` CLI: check, fmt, …) — so
      # a new native test is picked up by naming alone, no edit here.
      - name: Native binary suites (corpus alignment, build -O, vl CLI)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno test -A --no-check tests/selfhost_native_*_test.ts tests/vl_*_test.ts
        env:
          SELFHOST_NATIVE_ALIGN: "1"

      # The corpus oracle on the wasm compiler (cases_wasm_test.ts): the full
      # directive corpus adjudicated by the refreshed seed under Deno. Explicit
      # here because only this job has a seed — in the `ci` job's `deno task
      # test` the file self-ignores (no build/vl-compiler.wasm).
      - name: Corpus oracle on the wasm compiler
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno test -A tests/cases_wasm_test.ts

      # The seed-backed LSP / playground editor-feature suites (semantic tokens,
      # hover, inlay hints, completion, the wasm-checker driver, cross-file
      # go-to-def / references, member completion, unused-export hints). Like
      # cases_wasm, they gate on build/vl-compiler.wasm and self-ignore in the
      # `ci` job (no seed); only THIS job has the refreshed seed, so they're run
      # explicitly here — otherwise they'd execute nowhere in CI. The set is
      # enforced complete by tests/ci_seed_coverage_test.ts (a seed-backed test
      # added without wiring it in here fails that guard, in the `ci` job).
      - name: Editor features on the wasm compiler
        if: steps.docs_check.outputs.docs_only != 'true'
        run: >-
          deno test -A --no-check
          tests/lsp_semantic_tokens_test.ts
          tests/lsp_inlay_hint_test.ts
          tests/lsp_wasm_checker_test.ts
          tests/lsp_crossfile_test.ts
          tests/lsp_crossfile_wasm_test.ts
          tests/lsp_crossfile_refs_wasm_test.ts
          tests/lsp_member_completion_wasm_test.ts
          tests/lsp_unused_export_wasm_test.ts
          tests/lsp_large_file_wasm_test.ts
          tests/playground_lsp_wasm_test.ts
          tests/playground_completion_test.ts

      # The release distribution build (roadmap H-M2): `--features embed-seed` bakes
      # the seed into the binary so a shipped `vl` is one self-contained file. Built
      # here (the seed now exists) and smoke-tested from a dir with NO on-disk seed,
      # forcing the embedded fallback — guards the distribution path against rot on
      # every push, not just at release time. Runs LAST: the feature build overwrites
      # target/release/vl, and no later step uses it. (The seed defaults to repo
      # build/vl-compiler.wasm; the earlier steps' `vl` is the no-feature build.)
      - name: Verify embedded-seed build (distribution path)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: |
          cargo build --release --features embed-seed --manifest-path scripts/vl-host/Cargo.toml
          probe="$(mktemp -d)"
          out="$(cd "$probe" && echo 'print(6 * 7)' | "$GITHUB_WORKSPACE/scripts/vl-host/target/release/vl" run)"
          if [ "$out" != "42" ]; then
            echo "embedded-seed smoke failed: expected 42 from the embedded fallback, got: $out"
            exit 1
          fi
          echo "embedded-seed build runs with no on-disk seed (got 42)."
