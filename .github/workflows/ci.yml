name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Fetch enough history for `git diff` to compare against the base.
          # On push events base_sha is available; on PRs we need the base ref.
          fetch-depth: 0

      # Docs-only gate — the shared detection (one implementation for both
      # jobs, so they cannot drift) lives in .github/actions/docs-only; heavy
      # steps below skip when it reports true and the job exits green, keeping
      # the required status check satisfied.
      - name: Detect docs-only change
        id: docs_check
        uses: ./.github/actions/docs-only

      - uses: denoland/setup-deno@v2
        if: steps.docs_check.outputs.docs_only != 'true'
        with:
          deno-version: v2.x

      # The LSP bundle is built with esbuild over node-resolved deps (binaryen,
      # vscode-languageserver*), so Node + node_modules are needed for that step.
      - uses: actions/setup-node@v5
        if: steps.docs_check.outputs.docs_only != 'true'
        with:
          node-version: 22
          cache: npm

      # Deno's module cache (esbuild, the jsr loader, std) — keyed on the lockfile
      # so it's reused until a dependency moves.
      - name: Cache Deno modules
        if: steps.docs_check.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Install node deps
        if: steps.docs_check.outputs.docs_only != 'true'
        run: npm ci

      # `deno check` now covers only the surviving type leaves (coreTypes.ts,
      # diagnostics.ts) — the TS compiler core is deleted; the `.vl` compiler is
      # type-checked by the native checker (lint-self.sh in ci-native).
      - name: Type-check (compiler)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno check compiler/*.ts

      - name: Lint
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno lint

      - name: Test (.vl corpus)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno task test

      - name: Build LSP bundle (verify it compiles)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno task build
        working-directory: lsp

  # ---------------------------------------------------------------------------
  # ci-native — gates the NATIVE self-hosting path (scripts/vl-host + the
  # self-host compiler wasm), end to end with zero TS/deno in the compile+run
  # loop past the seed. A SEPARATE, PARALLEL job: it never extends the `ci` job's
  # critical path (the maintainer is duration-sensitive), and a slow cold cargo
  # build here can't delay the deno suite's result.
  #
  # Steps: build the vl-host binary → refresh the seed compiler wasm + prove the
  # native fixpoint (the self-reproduction ladder: an observed
  # `compile(X, source) == X` byte-equality for the shipped seed) → self-lint in
  # the background while the native corpus alignment + `build -O` suites run
  # (env-gated, drive the corpus through `vl`).
  #
  # Caching: ubuntu-latest ships cargo, so we cache ~/.cargo + the cargo target
  # dir (cold wasmtime build ~2-4 min, warm seconds — busted only when
  # scripts/vl-host/Cargo.lock changes), the finished `vl` binary (skips cargo
  # entirely when rustc + lockfile + crate source are unchanged), and the seed +
  # its `.cwasm` sidecar keyed on the compiler source it was built from.
  #
  # Docs-only skip is mirrored from `ci` so a docs-only PR exits this job green
  # too (keeping the stable job name satisfied for branch protection).
  # ---------------------------------------------------------------------------
  ci-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Docs-only gate — the same shared detection the `ci` job uses (see
      # .github/actions/docs-only).
      - name: Detect docs-only change
        id: docs_check
        uses: ./.github/actions/docs-only

      # deno serves only the test tooling in this job (the corpus oracle + native
      # suites). The seed is obtained natively — cache, else the release seed via
      # scripts/fetch-seed.sh — so no Node/npm is needed here (the TS stage-0
      # toolchain that required binaryen from npm is off this path).
      - uses: denoland/setup-deno@v2
        if: steps.docs_check.outputs.docs_only != 'true'
        with:
          deno-version: v2.x

      - name: Cache Deno modules
        if: steps.docs_check.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-

      # Cargo registry/index + the vl-host target dir. Cold wasmtime build is the
      # only real cost here; warm restores drop it to seconds.
      #
      # The rustc version is part of the key ON PURPOSE: a target dir compiled by
      # one rustc is fully fingerprint-invalidated under the next (ubuntu-latest
      # bumps rustc often), AND actions/cache skips saving when the primary key
      # already exists — so without the version in the key, one toolchain bump
      # locks every later run into "restore stale → recompile all of wasmtime
      # cold → never resave". Versioned keys make a bump a clean miss: rebuild
      # once, save, warm thereafter. The broader restore-keys still carry the
      # registry/index across versions (downloads are version-agnostic).
      - name: Rustc version (cargo cache key)
        if: steps.docs_check.outputs.docs_only != 'true'
        id: rustc
        run: echo "v=$(rustc -V | tr ' ' '_')" >> "$GITHUB_OUTPUT"

      - name: Cache cargo + vl-host target
        if: steps.docs_check.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            scripts/vl-host/target
          key: cargo-${{ runner.os }}-${{ steps.rustc.outputs.v }}-${{ hashFiles('scripts/vl-host/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ steps.rustc.outputs.v }}-
            cargo-${{ runner.os }}-

      # The finished `vl` binary, keyed on EVERYTHING that determines it (rustc,
      # Cargo.lock, the crate source). An exact hit means cargo would reproduce
      # this same binary, so the build step is skipped outright — and "the host
      # still compiles" stays covered every run regardless: the embedded-seed
      # step at the end compiles the same crate (a feature superset) from
      # scratch inputs.
      - name: Cache vl-host binary
        if: steps.docs_check.outputs.docs_only != 'true'
        id: vlbin
        uses: actions/cache@v4
        with:
          path: scripts/vl-host/target/release/vl
          key: vl-bin-${{ runner.os }}-${{ steps.rustc.outputs.v }}-${{ hashFiles('scripts/vl-host/Cargo.lock', 'scripts/vl-host/Cargo.toml', 'scripts/vl-host/build.rs', 'scripts/vl-host/src/**') }}

      - name: Build vl-host (native tool)
        if: steps.docs_check.outputs.docs_only != 'true' && steps.vlbin.outputs.cache-hit != 'true'
        run: cargo build --release
        working-directory: scripts/vl-host

      # The rolling seed cache (F-tiers): an exact hit means the seed was built
      # from THIS compiler source; a restore-keys hit hands refresh-compiler.sh a
      # healthy older seed to SELF-compile current source with. On a cold cache
      # refresh-compiler.sh fetches the release seed (scripts/fetch-seed.sh)
      # rather than TS-minting. The fixpoint ladder below re-proves the seed
      # every run, so neither a cache hit nor a fetched seed weakens the gate.
      #
      # The `.cwasm` sidecar (the host's wasmtime-compilation cache) rides along:
      # on an exact hit every `vl` invocation in the job deserializes instead of
      # re-JITing the seed. A sidecar from a different wasmtime version fails
      # deserialization and the host recompiles + rewrites it (self-healing), so
      # a stale sidecar can cost time but never correctness.
      - name: Cache seed compiler wasm
        if: steps.docs_check.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: |
            build/vl-compiler.wasm
            build/vl-compiler.wasm.cwasm
          key: vl-seed-${{ runner.os }}-${{ hashFiles('compiler/*.vl') }}
          restore-keys: |
            vl-seed-${{ runner.os }}-

      # Self-compile current source with the seed AND prove the shipped seed is a
      # self-compilation fixed point (`--prove-fixpoint`): the ladder stops at the
      # first stage X with an OBSERVED `compile(X, source) == X` byte-equality —
      # the same witness the classic stage3/stage4 rebuild produced, without
      # recompiling byte-identical inputs. An exact seed-cache hit proves out in
      # ONE compiler self-compile (the seed reproduces itself); a stale
      # restore-keys/fetched seed climbs the classic two or three rungs. On a cold
      # cache refresh-compiler.sh fetches the release `seed-latest` (one push
      # stale is fine — the ladder re-proves it); a seed too stale to compile
      # current source fails loud (re-fetch seed-latest / land the change in
      # smaller steps). GH_TOKEN lets fetch-seed.sh use `gh release download` on
      # the cold path.
      - name: Refresh seed + native fixpoint (self-reproduction ladder)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: ./scripts/refresh-compiler.sh --prove-fixpoint
        env:
          GH_TOKEN: ${{ github.token }}

      # Dogfood: `vl` lints + fmt-checks its own source (`compiler/*.vl` + driver
      # + `std/`), gated at `info` (prefer-const / unused / warnings / errors all
      # fail). STARTED here, in the background, so it overlaps the deno-driven
      # native suites below (they only read the same binary + seed; nothing
      # writes either until the embedded-seed step, which is fenced behind the
      # result step). The exit code + log are collected by "Self-lint (result)".
      - name: Self-lint (start, concurrent with the native suites)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: |
          ( ./scripts/lint-self.sh > /tmp/lint-self.log 2>&1
            echo $? > /tmp/lint-self.rc ) &

      # Rep-composition fuzz smoke: pinned seeds against the known-failure
      # baseline — only a NEW shape failing (a rep regression) fails the job.
      # The big sweep stays manual: scripts/fuzz-vl.sh --seed N --count M.
      - name: Rep-composition fuzz smoke (pinned seeds, known-failure baseline)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: |
          ./scripts/fuzz-vl.sh --seed 101 --count 120 --depth 2 --quiet --baseline scripts/rep-fuzz-baseline.txt
          ./scripts/fuzz-vl.sh --seed 202 --count 120 --depth 3 --quiet --baseline scripts/rep-fuzz-baseline.txt
          ./scripts/fuzz-vl.sh --seed 303 --count 120 --depth 4 --quiet --baseline scripts/rep-fuzz-baseline.txt

      # The native-binary suites (env-gated, drive `vl` against the seed) are
      # discovered by convention — `selfhost_native_*` (corpus alignment / -O /
      # conversion / diag positions) and `vl_*` (the `vl` CLI: check, fmt, …) — so
      # a new native test is picked up by naming alone, no edit here.
      # `--parallel` fans the test FILES across the cores (one worker process
      # each); every case spawns its own `vl` subprocess, so cases are isolated
      # regardless of schedule.
      - name: Native binary suites (corpus alignment, build -O, vl CLI)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno test -A --no-check --parallel tests/selfhost_native_*_test.ts tests/vl_*_test.ts
        env:
          SELFHOST_NATIVE_ALIGN: "1"

      # The corpus oracle on the wasm compiler (cases_wasm_test.ts): the full
      # directive corpus adjudicated by the refreshed seed under Deno. Explicit
      # here because only this job has a seed — in the `ci` job's `deno task
      # test` the file self-ignores (no build/vl-compiler.wasm).
      - name: Corpus oracle on the wasm compiler
        if: steps.docs_check.outputs.docs_only != 'true'
        run: deno test -A tests/cases_wasm_test.ts

      # The seed-backed LSP / playground editor-feature suites (semantic tokens,
      # hover, inlay hints, completion, the wasm-checker driver, cross-file
      # go-to-def / references, member completion, unused-export hints). Like
      # cases_wasm, they gate on build/vl-compiler.wasm and self-ignore in the
      # `ci` job (no seed); only THIS job has the refreshed seed, so they're run
      # explicitly here — otherwise they'd execute nowhere in CI. The set is
      # enforced complete by tests/ci_seed_coverage_test.ts (a seed-backed test
      # added without wiring it in here fails that guard, in the `ci` job).
      - name: Editor features on the wasm compiler
        if: steps.docs_check.outputs.docs_only != 'true'
        run: >-
          deno test -A --no-check
          tests/lsp_semantic_tokens_test.ts
          tests/lsp_inlay_hint_test.ts
          tests/lsp_wasm_checker_test.ts
          tests/lsp_crossfile_test.ts
          tests/lsp_crossfile_wasm_test.ts
          tests/lsp_crossfile_refs_wasm_test.ts
          tests/lsp_member_completion_wasm_test.ts
          tests/lsp_unused_export_wasm_test.ts
          tests/lsp_large_file_wasm_test.ts
          tests/playground_lsp_wasm_test.ts
          tests/playground_completion_test.ts

      # Collect the backgrounded self-lint: wait for its rc file, replay the full
      # log, and fail the job on any lint/fmt finding. Sits BEFORE the
      # embedded-seed build as a fence — that build overwrites target/release/vl,
      # and lint must not race an in-place binary rewrite.
      - name: Self-lint (result)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: |
          while [ ! -f /tmp/lint-self.rc ]; do sleep 1; done
          cat /tmp/lint-self.log
          exit "$(cat /tmp/lint-self.rc)"

      # The release distribution build (roadmap H-M2): `--features embed-seed` bakes
      # the seed into the binary so a shipped `vl` is one self-contained file. Built
      # here (the seed now exists) and smoke-tested from a dir with NO on-disk seed,
      # forcing the embedded fallback — guards the distribution path against rot on
      # every push, not just at release time. Runs LAST: the feature build overwrites
      # target/release/vl, and no later step uses it. (The seed defaults to repo
      # build/vl-compiler.wasm; the earlier steps' `vl` is the no-feature build.)
      #
      # The plain binary is stashed and put back afterward, so the vl-bin cache's
      # post-job save (and anything else that reads target/release/vl later)
      # sees the NO-FEATURE binary, never the embed-seed one.
      - name: Verify embedded-seed build (distribution path)
        if: steps.docs_check.outputs.docs_only != 'true'
        run: |
          cp scripts/vl-host/target/release/vl /tmp/vl-plain
          cargo build --release --features embed-seed --manifest-path scripts/vl-host/Cargo.toml
          probe="$(mktemp -d)"
          out="$(cd "$probe" && echo 'print(6 * 7)' | "$GITHUB_WORKSPACE/scripts/vl-host/target/release/vl" run)"
          if [ "$out" != "42" ]; then
            echo "embedded-seed smoke failed: expected 42 from the embedded fallback, got: $out"
            exit 1
          fi
          echo "embedded-seed build runs with no on-disk seed (got 42)."
          mv /tmp/vl-plain scripts/vl-host/target/release/vl
