name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    # Point the VL build cache (compiler/buildCache.ts) at a workspace path so
    # actions/cache can persist it across runs (see the cache step below).
    env:
      VL_CACHE_DIR: ${{ github.workspace }}/.vl-cache
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # The LSP bundle is built with esbuild over node-resolved deps (binaryen,
      # vscode-languageserver*), so Node + node_modules are needed for that step.
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Deno's module cache (esbuild, the jsr loader, std) — keyed on the lockfile
      # so it's reused until a dependency moves.
      - name: Cache Deno modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-

      # The VL build cache — the whole-compile and binaryen-optimize() blobs from
      # compiler/buildCache.ts. Content-addressed internally (every key folds in a
      # compiler/binaryen fingerprint), so a rolling key is safe: each run restores
      # the most recent prior cache and saves an updated one. The optimize() blobs
      # survive compiler changes (keyed on binaryen + IR bytes), so a feature-add
      # PR reuses master's optimize results for every module whose output is
      # unchanged — the bulk of the self-host test cost.
      - name: Cache VL build cache
        uses: actions/cache@v4
        with:
          path: .vl-cache
          key: vl-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            vl-cache-${{ runner.os }}-

      - name: Install node deps
        run: npm ci

      - name: Type-check (compiler + test runner)
        run: deno check compiler/*.ts tests/cases_test.ts

      - name: Lint
        run: deno lint

      - name: Test (.vl corpus)
        run: deno task test

      - name: Build LSP bundle (verify it compiles)
        run: deno task build
        working-directory: lsp
