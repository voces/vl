# Shared docs-only detection — the ONE implementation both CI jobs consume, so
# the gate can never drift between them.
#
# Detects whether every file changed by this event matches *.md or docs/**. If
# so, each job's heavy steps are skipped and the job still exits green — which
# keeps any required status check satisfied without blocking merges.
#
# We intentionally do NOT use top-level `paths`/`paths-ignore` to skip whole
# workflows: that would leave a required check in a permanent "pending" state
# for docs-only PRs and block merges. This in-job conditional approach keeps
# job names stable so branch protection is never broken.
#
# On `pull_request` events the PR's own changes are `merge-base(base, head) →
# head` — the THREE-dot diff. A two-dot `base.sha → head` diff also surfaces
# every commit the base branch gained since the PR branched (as reversals), so
# a docs-only PR off an older master reads as non-docs and loses the skip.
# On `push` events we diff the pushed range (BEFORE → AFTER), falling back to
# HEAD~1 when the before-sha is unavailable (first push to a new branch).
#
# Requires the repo to be checked out with enough history for the merge-base
# (the CI jobs use fetch-depth: 0).
name: docs-only
description: Detect whether the triggering change touches only docs (docs/** or *.md)

outputs:
  docs_only:
    description: '"true" when every changed file is docs, else "false"'
    value: ${{ steps.detect.outputs.docs_only }}

runs:
  using: composite
  steps:
    - id: detect
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # Three-dot: only the PR's own changes (see the header comment).
          RANGE="$BASE...$HEAD"
        else
          BASE="${{ github.event.before }}"
          HEAD="${{ github.event.after }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          RANGE="$BASE $HEAD"
        fi

        # List the changed files, filtered to only non-docs files.
        NON_DOCS=$(git diff --name-only $RANGE \
          | grep -Ev '^(docs/|.*\.md$)' || true)

        if [ -z "$NON_DOCS" ]; then
          echo "docs_only=true" >> "$GITHUB_OUTPUT"
          echo "Docs-only change detected — heavy steps will be skipped."
        else
          echo "docs_only=false" >> "$GITHUB_OUTPUT"
          echo "Non-docs files changed:"
          echo "$NON_DOCS"
        fi
